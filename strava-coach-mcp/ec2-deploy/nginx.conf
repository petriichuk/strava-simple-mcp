# /etc/nginx/sites-available/strava-mcp  (symlink into sites-enabled)
# certbot will add the TLS lines once you run: sudo certbot --nginx -d yourdomain
server {
    server_name yourdomain;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_buffering off;          # keep streaming responses flowing
        proxy_read_timeout 300s;
    }

    listen 80;
}
